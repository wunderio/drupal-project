---
name: Build & Push Images

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "k8s/**"
      - "**.md"
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ${{ vars.REGISTRY || 'registry.wdr.io' }}
  REPO: ${{ github.event.repository.name }}

jobs:
  # ---------------------------------------------------------------
  # Stage 1: Validate codebase (lint, static analysis, tests).
  # Must pass before any build/deploy proceeds.
  # ---------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    container:
      image: wunderio/silta-cicd:circleci-php8.3-node22-composer2-v1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP CodeSniffer
        run: |
          if [ -d web/modules/custom ] && [ "$(ls -A web/modules/custom 2>/dev/null)" ]; then
            vendor/bin/phpcs --standard=Drupal,DrupalPractice web/modules/custom
          else
            echo "No custom modules found, skipping PHPCS."
          fi

      - name: PHPStan
        run: |
          if [ -f phpstan.neon ] || [ -f phpstan.neon.dist ]; then
            vendor/bin/phpstan analyse --no-progress
          else
            echo "No PHPStan config found, skipping."
          fi

      - name: PHPUnit
        run: |
          if [ -f phpunit.xml ] || [ -f phpunit.xml.dist ]; then
            vendor/bin/phpunit --no-coverage
          else
            echo "No PHPUnit config found, skipping."
          fi

      - name: npm lint
        run: |
          npm ci
          npm run lint || true

  # ---------------------------------------------------------------
  # Stage 2: Install production dependencies and build assets.
  # ---------------------------------------------------------------
  build-assets:
    name: Install & Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Composer install
        run: |
          composer install \
            --no-dev \
            --no-interaction \
            --optimize-autoloader \
            --prefer-dist
          # Restore execute permissions on all composer bin stubs and their targets.
          find vendor/bin -type f -o -type l | while read f; do
            chmod +x "$f"
            [ -L "$f" ] && chmod +x "$(readlink -f "$f")" 2>/dev/null || true
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: npm install & build
        run: |
          npm ci
          npm run build

      - name: Upload built codebase
        uses: actions/upload-artifact@v4
        with:
          name: built-codebase
          path: |
            .
            !.git
            !node_modules
          retention-days: 1

  # ---------------------------------------------------------------
  # Stage 3: Build and push Docker images.
  # ---------------------------------------------------------------
  build-images:
    name: Build & Push — ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    needs: build-assets
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: php
            dockerfile: silta/php.Dockerfile
          - name: nginx
            dockerfile: silta/nginx.Dockerfile
          - name: shell
            dockerfile: silta/shell.Dockerfile

    steps:
      - name: Build & push image
        uses: wunderio/silta-actions/build-push-image@v1
        with:
          artifact-name: built-codebase
          image-name: ${{ matrix.target.name }}
          dockerfile: ${{ matrix.target.dockerfile }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ secrets.REGISTRY_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_PASSWORD }}
