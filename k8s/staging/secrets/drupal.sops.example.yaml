---
# Example SOPS-encrypted secret.
#
# USAGE:
#   1. Copy this file to drupal.sops.yaml
#   2. Fill in the real values in stringData
#   3. Encrypt in-place:
#        export SOPS_AGE_RECIPIENTS=age1...
#        sops --encrypt --in-place k8s/staging/secrets/drupal.sops.yaml
#   4. Commit the encrypted file.
#   5. To edit later:
#        sops k8s/staging/secrets/drupal.sops.yaml
#
# IMPORTANT: Never commit the plaintext version of this file.
apiVersion: v1
kind: Secret
metadata:
  name: drupal-project-secrets
type: Opaque
stringData:
  DRUPAL_HASH_SALT: "change-me-to-a-long-random-string"
  # SMTP_PASSWORD: "..."
