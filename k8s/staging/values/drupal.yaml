---
# Helm values for the drupal chart — staging environment.
#
# Image tags are managed by ArgoCD Image Updater via git write-back.
# Tag format: {branch-normalized}-{timestamp}-{sha}
# Example:    main-20260101T120000-abc1234
#
# These values are merged on top of:
#   1. cluster-management base-values.yaml (cluster-wide defaults)
#   2. This file (project + environment specifics)
#
# UPDATE: Change image repository paths to match your Harbor project name.

php:
  image:
    # UPDATE: Replace CHANGEME with your Harbor project name (e.g. client-fi-mysite).
    repository: registry.wdr.io/CHANGEME/php
    tag: main-00000000T000000-0000000
  drupalCoreVersion: "11"
  cron:
    drupal:
      # Run cron once an hour in staging.
      schedule: "~ * * * *"

nginx:
  image:
    repository: registry.wdr.io/CHANGEME/nginx
    tag: main-00000000T000000-0000000

shell:
  image:
    repository: registry.wdr.io/CHANGEME/shell
    tag: main-00000000T000000-0000000

# Reference data: sync from main/staging environment.
# Disable if no staging environment exists yet.
referenceData:
  enabled: false

# Enable Mailpit (mail catcher) in non-production environments.
mailpit:
  enabled: true

# MariaDB configuration.
# IMPORTANT: Explicit passwords prevent credential drift on helm upgrade.
# The Bitnami MariaDB chart regenerates passwords when empty (randAlphaNum),
# causing "Access denied" errors because the Secret updates but the PVC keeps
# the original password.
mariadb:
  enabled: true
  db:
    password: "drupal-dev-db-pass"
  rootUser:
    password: "drupal-dev-root-pass"
  master:
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 25m
        memory: 366Mi
      limits:
        memory: 488Mi

# File mounts — storageClassName and accessMode come from base-values.yaml.
mounts:
  public-files:
    enabled: true
    storage: 10Gi
    mountPath: /app/web/sites/default/files
  private-files:
    enabled: true
    storage: 1Gi
    mountPath: /app/private
